            - generic [ref=f75e480]: Все было хорошо! Обращался для установки колонок, все сделали примерно за три часа. Просто приехал, поменял, остался доволен. Выбрал студию по рекомендации знакомых, которые уже обращались. Услугами воспользовался один раз на автомобиле Jeep Renegade.
