            - generic [ref=f75e1143]: Мне понравилось качество обслуживания со стороны сотрудников сервиса! Хочу отметить то, что ребята профессионально, быстро сделали усилитель и заменили колонки. Все выполнено достойно, ничего не сломалось и до сих пор функционирует исправно.
