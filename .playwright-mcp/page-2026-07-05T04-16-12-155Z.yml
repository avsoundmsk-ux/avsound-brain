            - generic [ref=f75e582]: В студии оказались адекватные и конкурентные цены на автозвук. Консультант подробно рассказал о разных вариантах сабвуферов для Лады Приоры в нужном ценовом диапазоне, помог подобрать оптимальный по качеству вариант. Все товары были в наличии, что особенно удобно. Выбрал эту студию, так как она работает допоздна - это решающий фактор был при выборе.
