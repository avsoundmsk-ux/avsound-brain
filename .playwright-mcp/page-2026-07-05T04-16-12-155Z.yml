                - generic [ref=f75e545]: Дмитрий
            - generic [ref=f75e548]: Обращался в студию за установкой автозвука – остался доволен! Мастера сделали всё, как я хотел, причем даже доделали дополнительные работы бесплатно, когда у меня самого не получилось. Колонки поставили за три часа, без лишних вопросов. Выбрал эту студию из-за удобного расположения – живу рядом.
